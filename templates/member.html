<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>社员风范</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column; 
            justify-content: center;  
            align-items: center;      
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1rem;
        }
        .carousel {
            position: relative;
            width: 100%;
            max-width: 900px;          
            aspect-ratio: 16 / 9;       
            border-radius: 28px;
            background-color: #1e2a3a;   
            box-shadow: 0 25px 40px -12px rgba(0, 20, 30, 0.4);
            overflow: hidden;           
            transition: box-shadow 0.3s;
            margin-bottom: 20px;
        }

        .carousel-slides {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;   
        }

        .carousel-slides img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;           
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: opacity;
            border: none;
            pointer-events: none;          
            user-select: none;
        }

        .carousel-slides img.active {
            opacity: 1;
            pointer-events: auto;          
            transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background-color: rgba(20, 30, 35, 0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 300;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px -6px rgba(0, 30, 40, 0.5);
            line-height: 1;
            user-select: none;
        }

        .carousel-btn:hover {
            background-color: rgba(35, 50, 60, 0.85);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 12px 24px -8px #00000080;
        }

        .carousel-btn:active {
            transform: translateY(-50%) scale(0.98);
            background-color: rgba(10, 20, 25, 0.9);
        }


        .carousel-btn.prev {
            left: 20px;
        }

        .carousel-btn.next {
            right: 20px;
        }

        .carousel-indicators {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 20;
            padding: 8px 12px;
            pointer-events: none;          
        }

        .carousel-indicators span {
            display: inline-block;
            width: 32px;
            height: 6px;
            border-radius: 20px;
            background-color: rgba(210, 225, 235, 0.6);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            pointer-events: auto;            
        }
        .carousel-indicators span.active {
            background-color: #ffffff;
            width: 44px;
            border-color: rgba(255, 215, 100, 0.7);
            box-shadow: 0 0 12px #ffdd77cc;
        }

        .carousel-indicators span:hover {
            background-color: #fffbe3;
            transform: scaleY(1.3);
        }

        @media (max-width: 600px) {
            .carousel-btn {
                width: 38px;
                height: 38px;
                font-size: 28px;
            }
            .carousel-indicators span {
                width: 26px;
                height: 5px;
            }
            .carousel-indicators span.active {
                width: 38px;
            }
        }

        @media (hover: none) {
            .carousel-btn:hover {
                transform: translateY(-50%) scale(1);
                background-color: rgba(20, 30, 35, 0.65);
            }
        }
        .carousel-slides img {
            transition: opacity 0.7s ease-in-out;
        }
        .site-footer {
            width: 100%;             
            background-color: rgba(30, 42, 58, 0.9);  
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #eef5ff;
            margin-top: 40px;              
            padding: 1.2rem 0;                
            box-shadow: 0 -8px 20px -10px rgba(0, 20, 30, 0.5);
            font-size: 0.95rem;
        }
        .footer-content {
            max-width: 900px;
            margin: 0 auto;                 
            padding: 0 1.5rem;               
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .footer-content p {
            margin: 0.3rem 0.8rem;
            line-height: 1.5;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        video {
            border-radius: 15px;
            max-width: 100%;
            height: auto;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <a href="../index.html"><h1 style="color: rgb(43, 43, 187);">主页</h1></a>
    <h1>社员风采</h1>
    <div class="carousel" id="carouselDemo">
        <div class="carousel-slides">
            <img src="../static/images/member1.jpg" class="active">
            <img src="../static/images/member2.jpg">
            <img src="../static/images/member3.jpg">
            <img src="../static/images/member4.jpg">
        </div>
        <button class="carousel-btn prev" aria-label="上一张" id="prevBtn">‹</button>
        <button class="carousel-btn next" aria-label="下一张" id="nextBtn">›</button>
        <div class="carousel-indicators" id="indicatorsContainer"></div>
    </div>
    <video src="../static/mp4/Team Building.mp4" style="border-radius: 15px;" controls ></video>
    <footer class="site-footer">
        <div class="footer-content">
            <p>2026 武汉一高IT社</p>
        </div>
    </footer>
    <script>
        (function() {
            const carousel = document.getElementById('carouselDemo');
            const slidesContainer = carousel.querySelector('.carousel-slides');
            const images = carousel.querySelectorAll('.carousel-slides img');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const indicatorsContainer = document.getElementById('indicatorsContainer');
            const totalSlides = images.length;
            let currentIndex = 0;                
            let autoPlayInterval = null;
            let isHovering = false;              
            const AUTO_PLAY_INTERVAL = 3000;       
            if (totalSlides === 0) return;
            function updateIndicators() {
                const indicators = indicatorsContainer.children;
                for (let i = 0; i < indicators.length; i++) {
                    const dot = indicators[i];
                    if (i === currentIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                }
            }
            function goToSlide(index) {
                if (index < 0) index = totalSlides - 1;
                if (index >= totalSlides) index = 0;
                if (index === currentIndex) {
                    resetAutoPlay();      
                    return;
                }
                images[currentIndex].classList.remove('active');
                images[index].classList.add('active');
                currentIndex = index;
                updateIndicators();
                resetAutoPlay();
            }
            function prevSlide() {
                const newIndex = (currentIndex - 1 + totalSlides) % totalSlides;
                goToSlide(newIndex);
            }
            function nextSlide() {
                const newIndex = (currentIndex + 1) % totalSlides;
                goToSlide(newIndex);
            }
            function resetAutoPlay() {
                if (autoPlayInterval) {
                    clearInterval(autoPlayInterval);
                    autoPlayInterval = null;
                }
                if (!isHovering) {
                    autoPlayInterval = setInterval(() => {
                        nextSlide();
                    }, AUTO_PLAY_INTERVAL);
                }
            }
            function createIndicators() {
                indicatorsContainer.innerHTML = ''; 
                for (let i = 0; i < totalSlides; i++) {
                    const dot = document.createElement('span');
                    dot.setAttribute('data-index', i);
                    dot.setAttribute('aria-label', `切换到第 ${i + 1} 张`);
                    indicatorsContainer.appendChild(dot);
                }
                updateIndicators();
            }
            prevBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                prevSlide();
            });

            nextBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                nextSlide();
            });
            indicatorsContainer.addEventListener('click', function(e) {
                const target = e.target;
                if (target.tagName === 'SPAN' && target.hasAttribute('data-index')) {
                    const index = parseInt(target.getAttribute('data-index'), 10);
                    if (!isNaN(index) && index >= 0 && index < totalSlides) {
                        goToSlide(index);
                    }
                }
            });
            carousel.addEventListener('mouseenter', function() {
                isHovering = true;
                if (autoPlayInterval) {
                    clearInterval(autoPlayInterval);
                    autoPlayInterval = null;
                }
            });

            carousel.addEventListener('mouseleave', function() {
                isHovering = false;
                resetAutoPlay();
            });
            window.addEventListener('blur', function() {
                if (autoPlayInterval) {
                    clearInterval(autoPlayInterval);
                    autoPlayInterval = null;
                }
            });

            window.addEventListener('focus', function() {
                if (!isHovering) {
                    resetAutoPlay();
                }
            });
            function initCarousel() {
                images.forEach((img, idx) => {
                    if (idx === 0) img.classList.add('active');
                    else img.classList.remove('active');
                });
                currentIndex = 0;
                createIndicators();
                resetAutoPlay();
            }
            initCarousel();
            images.forEach(img => {
                img.addEventListener('error', function() {
                    this.style.backgroundColor = '#2c3e50';
                });
            });

        })();
    </script>
    <script src="/cdn-fix.js"></script>
</body>
</html>
